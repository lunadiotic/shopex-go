services:
  postgres:
    image: postgres:17.5
    container_name: shopex-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-shopex}

    ports:
      - '${POSTGRES_PORT:-5432}:5432'

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-shopex}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - shopex-network

  redis:
    image: redis:8.2
    container_name: shopex-redis

    restart: unless-stopped

    ports:
      - '${REDIS_PORT:-6379}:6379'

    volumes:
      - redis-data:/data

    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - shopex-network

  rabbitmq:
    image: rabbitmq:4.1-management
    container_name: shopex-rabbitmq

    restart: unless-stopped

    ports:
      - '${RABBITMQ_PORT:-5672}:5672'
      - '${RABBITMQ_MANAGEMENT_PORT:-15672}:15672'

    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

    networks:
      - shopex-network

  mailpit:
    image: axllent/mailpit:v1.27

    container_name: shopex-mailpit

    restart: unless-stopped

    ports:
      - '${MAILPIT_SMTP_PORT:-1025}:1025'
      - '${MAILPIT_WEB_PORT:-8025}:8025'

    networks:
      - shopex-network

  pgadmin:
    image: dpage/pgadmin4:9.5

    container_name: shopex-pgadmin

    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}

    ports:
      - '${PGADMIN_PORT:-5050}:80'

    volumes:
      - pgadmin-data:/var/lib/pgadmin

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - shopex-network

networks:
  shopex-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  pgadmin-data:
